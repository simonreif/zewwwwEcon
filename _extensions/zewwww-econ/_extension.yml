title:  zewwwwEcon
author: Simon Reif, Benedikt Stelter, Paul Gerhard Peters, Sabrina Schubert
version: 0.2.0
quarto-required: ">=1.7.0"
contributes:
  formats:
    pdf:
      pdf-engine: xelatex
      template: latex/zewwwwPaperTemplate.tex
      keep-tex: false
      cite-method: biblatex
      cap-location: top
      filters:
        - fontpath.lua
        - notes-block.lua
        - appendix-setup.lua

    beamer:
      pdf-engine: xelatex
      template: latex/zewwwwSlidesTemplate.tex
      keep-tex: false
      cite-method: biblatex
      cap-location: top
      filters:
        - fontpath.lua
        - notes-block.lua
        - appendix-setup.lua
